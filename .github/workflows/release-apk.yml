name: release-apk

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  NCNN_VERSION: 20260526
  OPENCV_VERSION: 4.13.0
  OPENCV_MOBILE_TAG: v35
  BUILD_TOOLS_VERSION: 36.0.0

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: setup-gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.12

      - name: ncnn
        run: |
          set -e
          URL="https://github.com/Tencent/ncnn/releases/download/${NCNN_VERSION}/ncnn-${NCNN_VERSION}-android-vulkan.zip"
          curl -L --fail --retry 8 --retry-delay 5 --retry-all-errors --connect-timeout 20 -o ncnn-${NCNN_VERSION}-android-vulkan.zip "${URL}"
          unzip -q ncnn-${NCNN_VERSION}-android-vulkan.zip -d app/src/main/jni

      - name: opencv-mobile
        run: |
          set -e
          FILE="opencv-mobile-${OPENCV_VERSION}-android.zip"
          URL1="https://github.com/nihui/opencv-mobile/releases/download/${OPENCV_MOBILE_TAG}/${FILE}"
          URL2="https://sourceforge.net/projects/opencv-mobile.mirror/files/${OPENCV_MOBILE_TAG}/${FILE}/download"

          if ! curl -L --fail --retry 8 --retry-delay 5 --retry-all-errors --connect-timeout 20 -o "${FILE}" "${URL1}"; then
            echo "GitHub download failed, trying SourceForge mirror..."
            curl -L --fail --retry 8 --retry-delay 5 --retry-all-errors --connect-timeout 20 -o "${FILE}" "${URL2}"
          fi

          unzip -q "${FILE}" -d app/src/main/jni

      - name: modify-jni-cmakelists
        run: |
          sed -i "s@ncnn-[^-]*-android-vulkan@ncnn-${NCNN_VERSION}-android-vulkan@g" app/src/main/jni/CMakeLists.txt
          sed -i "s@opencv-mobile-[^-]*-android@opencv-mobile-${OPENCV_VERSION}-android@g" app/src/main/jni/CMakeLists.txt

      - name: clean-duplicate-java-files
        run: |
          find app/src/main/java -name '*(*).java' -print -delete
          find app/src/main/java -name '*.bak' -print -delete
          find app/src/main/java -name '*~' -print -delete

      - name: build-apk
        run: |
          gradle assembleRelease --stacktrace --no-daemon

      - name: sign-apk
        id: signapk
        run: |
          DATE=`date +'%Y%m%d'`
          SHA_SHORT=`git rev-parse --short HEAD`
          UNSIGNED_APK=`find app/build/outputs/apk/release -type f -name "*-release-unsigned.apk" | head -n 1`
          SIGNED_APK=${{ github.event.repository.name }}-${DATE}.${SHA_SHORT}.apk

          keytool -genkey -noprompt -alias ncnn \
            -dname "CN=mqttserver.ibm.com, OU=ID, O=IBM, L=Hursley, S=Hants, C=GB" \
            -keystore ncnn.keystore -storepass 7767517 -keypass 7767517 \
            -keyalg RSA -keysize 2048 -validity 10000

          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/zipalign -f -v 4 ${UNSIGNED_APK} ${SIGNED_APK}

          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner sign \
            --ks ncnn.keystore \
            --ks-key-alias ncnn \
            --ks-pass pass:7767517 \
            --key-pass pass:7767517 \
            --out ${SIGNED_APK} \
            ${SIGNED_APK}

          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner verify ${SIGNED_APK}

          echo "SIGNED_APK=${SIGNED_APK}" >> $GITHUB_OUTPUT
          echo "APK_VERSION=${DATE}.${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: create-release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.signapk.outputs.APK_VERSION }}
          name: Release ${{ steps.signapk.outputs.APK_VERSION }}
          files: ${{ steps.signapk.outputs.SIGNED_APK }}
